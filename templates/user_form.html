{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-header bg-white py-3">
        <h4 class="card-title mb-0">
          {% if user %}Редактирование пользователя{% else %}Новый пользователь{% endif %}
        </h4>
      </div>
      <div class="card-body p-4">
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Имя пользователя</label>
            <input type="text" name="username" class="form-control" value="{{ user.username if user else '' }}" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Роль</label>
            <select name="role" class="form-select">
              <option value="user" {% if not user or user.role == 'user' %}selected{% endif %}>Пользователь</option>
              <option value="restricted" {% if user and user.role == 'restricted' %}selected{% endif %}>Менеджер</option>
              <option value="admin" {% if user and user.role == 'admin' %}selected{% endif %}>Администратор</option>
            </select>
          </div>
          
          <div class="mb-3">
            <label class="form-label">
              Пароль
              {% if user %}
              <span class="text-muted small fw-normal">(оставьте пустым, чтобы не менять)</span>
              {% endif %}
            </label>
            <input type="password" name="password" class="form-control" {% if not user %}required{% endif %}>
          </div>

          <div class="mb-3">
            <label class="form-label">URL аватара</label>
            <input type="url" name="avatar_url" class="form-control" value="{{ user.avatar_url if user else '' }}" placeholder="https://...">
          </div>

          <div class="d-flex justify-content-between align-items-center mt-4">
            <a href="{{ url_for('users_list') }}" class="text-decoration-none text-muted">Отмена</a>
            <button type="submit" class="btn btn-primary px-4">Сохранить</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
