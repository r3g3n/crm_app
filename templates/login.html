{% extends "base.html" %}
{% block content %}
<div class="login-container">
  <div class="card login-card shadow-lg">
    <div class="login-logo">
      <img src="https://optim.tildacdn.net/tild6239-3337-4434-b530-356434633530/-/resize/240x/-/format/webp/AGS-EU---140-300-2.png.webp" alt="AGS Logo" height="60" class="mb-3">
      <h1 class="h4 fw-bold mb-2">Welcome to AGS CRM</h1>
      <p class="text-body-secondary small">Please sign in to continue</p>
    </div>
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-medium">Username</label>
        <div class="input-group">
          <span class="input-group-text bg-body-secondary border-end-0"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control border-start-0 ps-0" placeholder="Enter your username" required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-medium">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-body-secondary border-end-0"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control border-start-0 ps-0" placeholder="Enter your password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Sign In</button>
    </form>
    <div class="text-center mt-4 pt-3 border-top">
      <p class="text-muted small mb-1">xCRM v1.1 AGS Europe 2026</p>
      <div class="d-flex justify-content-center gap-2 small text-muted">
        <code>powered by xplus</code>
      </div>
    </div>
  </div>
</div>
{% endblock %}
